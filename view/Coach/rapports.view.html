<!doctype html>
<html lang="fr">

      <div class="flex items-center gap-10">
        <a href="dashboard.view.html" class="py-4 text-xl font-extrabold tracking-tight text-indigo-800">CaisseClasse</a>
        <nav class="hidden items-stretch gap-7 md:flex">
          <a href="dashboard.view.html" class="relative px-2 py-4 text-sm text-neutral-400 hover:text-neutral-700">Dashboard</a>
          <a href="statistiques.view.html" class="relative px-2 py-4 text-sm text-neutral-400 hover:text-neutral-700">Statistiques</a>

      </div>
      <div class="rounded-lg border border-neutral-300 bg-white p-4 shadow-sm">

        <div class="mt-1 text-[28px] font-bold text-neutral-800">4</div>
