<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Nouvelle Campagne - CaisseClasse</title>
</head>
<body class="min-h-screen bg-[#f4f4f4] text-neutral-900">
  <header class="border-b border-neutral-300 bg-[#efefef]">
    <div class="mx-auto flex max-w-[1024px] items-stretch justify-between px-4">
      <div class="flex items-center gap-10">
        <a href="dashboard.view.html" class="py-4 text-xl font-extrabold tracking-tight text-indigo-800">CaisseClasse</a>
        <nav class="hidden items-stretch gap-7 md:flex">
          <a href="dashboard.view.html" class="relative px-2 py-4 text-sm text-neutral-500 hover:text-neutral-700">Dashboard</a>
          <a href="paiements.view.html" class="relative px-2 py-4 text-sm text-neutral-500 hover:text-neutral-700">Paiements</a>
          <a href="campagnes.view.html" class="relative px-2 py-4 text-sm text-indigo-800 font-semibold">Campagnes<span class="absolute left-0 -bottom-px h-0.5 w-full bg-indigo-700"></span></a>
          <a href="apprenants.view.html" class="relative px-2 py-4 text-sm text-neutral-500 hover:text-neutral-700">Apprenants</a>
          <a href="retards.view.html" class="relative px-2 py-4 text-sm text-neutral-500 hover:text-neutral-700">Retards</a>
        </nav>
      </div>
      <div class="flex items-center"><a href="login.view.html" class="py-4 text-sm text-neutral-500 hover:text-neutral-700">Déconnexion</a></div>
    </div>
  </header>
  <main class="mx-auto max-w-[1024px] px-4 py-8">
    <div class="grid gap-6 lg:grid-cols-[250px_1fr]">
      <div class="pt-2">
        <h1 class="text-2xl font-extrabold text-neutral-800">Nouveau Campagne</h1>
      </div>
      <div class="max-w-[470px] rounded-lg bg-white p-4 shadow-sm">
        <form class="space-y-5">
          <label class="block">
            <span class="mb-2 block text-[15px] font-medium text-neutral-800">Type</span>
            <input class="w-full rounded-md border border-neutral-300 px-4 py-3 text-[15px] placeholder:text-neutral-400 outline-none focus:border-indigo-600" placeholder="Anniversaire / Décès / Autre">
          </label>
          <label class="block">
            <span class="mb-2 block text-[15px] font-medium text-neutral-800">Titre</span>
            <input class="w-full rounded-md border border-neutral-300 px-4 py-3 text-[15px] placeholder:text-neutral-400 outline-none focus:border-indigo-600" placeholder="Anniversaire Avril">
          </label>
          <label class="block">
            <span class="mb-2 block text-[15px] font-medium text-neutral-800">Montant (FCFA)</span>
            <input class="w-full rounded-md border border-neutral-300 px-4 py-3 text-[15px] placeholder:text-neutral-400 outline-none focus:border-indigo-600" placeholder="5 000">
          </label>
          <label class="block">
            <span class="mb-2 block text-[15px] font-medium text-neutral-800">Date limite</span>
            <input class="w-full rounded-md border border-neutral-300 px-4 py-3 text-[15px] placeholder:text-neutral-400 outline-none focus:border-indigo-600" placeholder="22/04/2026">
          </label>
          <button type="button" class="mt-2 w-full rounded-md bg-indigo-800 py-3 text-[15px] font-semibold text-white">Creer Campagne</button>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
