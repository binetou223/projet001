<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>CaisseClasse</title>
</head>
<body class="min-h-screen bg-[#f7faf6] text-neutral-900">
  <main class="flex min-h-screen items-center justify-center px-4 py-10">
    <section class="w-full max-w-[420px] rounded-2xl border border-neutral-300 bg-white px-8 py-8 shadow-sm">
      <div class="text-center">
        <h1 class="text-[34px] font-extrabold tracking-tight text-indigo-800">CaisseClasse</h1>
        <p class="mt-1 text-[15px] text-neutral-400">Gestion des cotisations</p>
      </div>
      <div class="my-5 border-t border-neutral-300"></div>
      <form class="space-y-5">
        <label class="block">
          <span class="mb-2 block text-[15px] font-medium text-neutral-800">Email</span>
          <input type="email" placeholder="email@exemple.com" class="w-full rounded-md border border-neutral-300 bg-white px-4 py-3 text-[15px] text-neutral-800 outline-none placeholder:text-neutral-400 focus:border-indigo-600">
        </label>
        <label class="block">
          <span class="mb-2 block text-[15px] font-medium text-neutral-800">Mot de passe</span>
          <input type="password" placeholder="••••••••" class="w-full rounded-md border border-neutral-300 bg-white px-4 py-3 text-[15px] text-neutral-800 outline-none placeholder:text-neutral-400 focus:border-indigo-600">
        </label>
        <a href="dashboard.view.html" class="mt-2 block w-full rounded-md bg-indigo-800 py-3 text-center text-[15px] font-semibold text-white">Se connecter</a>
        <div class="space-y-2 pt-2 text-center text-[15px] text-indigo-800">
          <a href="#" class="block">Mot de passe oublié ?</a>
          <a href="register.view.html" class="block">Pas de compte ? S’inscrire</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
